name: Build and Deploy

on:
  push:
    branches: [main, staging]
    paths:
      - src/**
      - package.json
      - yarn.lock
      - .github/**
      - next.config.js
      - tailwind.config.js
      - postcss.config.js
      - tsconfig.json
      - Dockerfile

env:
  IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/officeai

jobs:
  # ─── Job 1: Lint & Build Check ────────────────────────────────────────────
  check:
    name: Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: ESLint
        run: yarn lint

      - name: Build check
        run: yarn build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

  # ─── Job 2: Build & Push Docker Image ─────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: check
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy with Rollback ──────────────────────────────────────────
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Set SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy.key
          chmod 600 deploy.key

      - name: Deploy with rollback
        run: |
          ssh -o StrictHostKeyChecking=no -i deploy.key ${{ secrets.SSH_USER }}@${{ secrets.ORACLE_VM_URL }} bash << EOF
            set -e
            IMAGE="${{ env.IMAGE }}"
            NEW_TAG="${{ github.sha }}"
            APP_NAME="officeai"
            APP_DIR="/opt/officeai"

            echo "▶ New image tag: \$NEW_TAG"

            # ── Save current tag for rollback ──────────────────────────────
            PREV_TAG=\$(docker inspect --format='{{index .Config.Image}}' \$APP_NAME 2>/dev/null \
              | awk -F: '{print \$2}' || echo "")

            if [ -z "\$PREV_TAG" ]; then
              echo "No previous container found — fresh deploy"
            else
              echo "▶ Previous tag saved for rollback: \$PREV_TAG"
            fi

            # ── Pull new image ─────────────────────────────────────────────
            echo "▶ Pulling \$IMAGE:\$NEW_TAG ..."
            docker pull \$IMAGE:\$NEW_TAG

            # ── Write tag into env file so compose picks it up ─────────────
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=\$NEW_TAG|" \$APP_DIR/.env || \
              echo "IMAGE_TAG=\$NEW_TAG" >> \$APP_DIR/.env

            # ── Deploy ─────────────────────────────────────────────────────
            cd \$APP_DIR
            docker compose up -d --remove-orphans

            # ── Health check (wait up to 30s) ──────────────────────────────
            echo "▶ Health checking..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              STATUS=\$(docker inspect -f '{{.State.Running}}' \$APP_NAME 2>/dev/null || echo "false")
              if [ "\$STATUS" = "true" ]; then
                echo "✅ Deploy successful: \$NEW_TAG"
                docker image prune -f --filter "label=app=\$APP_NAME" || true
                exit 0
              fi
              echo "  Attempt \$i/6 — not running yet..."
            done

            # ── Rollback ───────────────────────────────────────────────────
            echo "❌ Deploy failed. Rolling back to \$PREV_TAG..."

            if [ -z "\$PREV_TAG" ]; then
              echo "No previous image to roll back to. Manual intervention needed."
              exit 1
            fi

            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=\$PREV_TAG|" \$APP_DIR/.env
            docker compose up -d --remove-orphans

            echo "⏪ Rolled back to \$PREV_TAG"
            exit 1
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f deploy.key
